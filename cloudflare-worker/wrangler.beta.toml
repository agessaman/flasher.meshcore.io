# BETA channel firmware proxy.
#
# Deploy with:  wrangler deploy -c wrangler.beta.toml
#
# This is a SEPARATE Worker (different `name`) rather than a route added to the
# production one, deliberately: the two channels then share no deployment, so a
# bad beta deploy cannot take down firmware downloads for the production fleet.
# The Worker source is identical — only RELEASE_BASE and the hostname differ,
# and firmware-proxy.js already reads RELEASE_BASE from env.
#
# DNS: do NOT pre-create a record for observer-fw-beta. `custom_domain = true`
# makes Cloudflare create and manage the hostname itself on deploy (a proxied
# CNAME owned by Workers), exactly as it did for observer-fw. A hand-made
# A/AAAA/CNAME for the same name conflicts and can make the deploy fail.
# Requirement is only that the gessaman.com zone lives in the same Cloudflare
# account as the Worker.
#
# Must stay consistent with .github/workflows/build-observer-firmwares-beta.yml
# in the MeshCore repo:
#   STATIC_PATH  = https://observer-fw-beta.gessaman.com   (this hostname)
#   RELEASE_TAG  = observer-mqtt-beta-latest               (RELEASE_BASE below)

name = "meshcore-firmware-proxy-beta"
main = "src/firmware-proxy.js"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "observer-fw-beta.gessaman.com", custom_domain = true }
]

[vars]
RELEASE_BASE = "https://github.com/agessaman/MeshCore/releases/download/observer-mqtt-beta-latest"
