<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeshCore Observer — Setup Guide</title>
  <link href="/css/beer.css" rel="stylesheet">
  <link href="/css/flasher.css" rel="stylesheet">
  <script src="/lib/marked.min.js"></script>
  <style>
    body {
      display: block;
      min-height: 100vh;
    }

    .docs-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface-container);
      border-bottom: 1px solid var(--outline-variant);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .docs-header h5 {
      margin: 0;
      flex: 1;
    }

    .docs-header .logo-top img {
      height: 16px;
      margin-top: -4px;
      vertical-align: middle;
    }

    .docs-header .logo-top span {
      font-style: italic;
      font-weight: bold;
      line-height: 0.9;
    }

    .docs-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* TOC sidebar on wider screens */
    @media (min-width: 1100px) {
      .docs-layout {
        display: grid;
        grid-template-columns: 220px 1fr;
        max-width: 1200px;
        margin: 0 auto;
        gap: 2rem;
        padding: 2rem 1.5rem 4rem;
      }

      .docs-body {
        max-width: none;
        margin: 0;
        padding: 0;
      }

      .docs-toc {
        position: sticky;
        top: 4rem;
        align-self: start;
        max-height: calc(100vh - 5rem);
        overflow-y: auto;
      }
    }

    @media (max-width: 1099px) {
      .docs-layout {
        padding: 0;
      }

      .docs-toc {
        display: none;
      }
    }

    /* TOC styles */
    .docs-toc {
      display: flex;
      flex-direction: column;
    }

    .docs-toc h6 {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--on-surface-variant);
      margin: 0 0 0.5rem;
    }

    .docs-toc ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
    }

    .docs-toc li a {
      display: block;
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
      color: var(--on-surface-variant);
      text-decoration: none;
      border-radius: 4px;
      border-left: 2px solid transparent;
    }

    .docs-toc li a:hover,
    .docs-toc li a.active {
      color: var(--primary);
      border-left-color: var(--primary);
      background: var(--surface-container-high);
    }

    .docs-toc li.h3 a {
      padding-left: 1.1rem;
      font-size: 0.75rem;
    }

    /* Markdown content styles */
    .docs-content {
      color: var(--on-background);
      line-height: 1.7;
    }

    .docs-content h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      color: var(--on-background);
    }

    .docs-content h1 + p {
      color: var(--on-surface-variant);
      margin-top: 0;
      font-size: 1rem;
    }

    .docs-content h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 2.5rem 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--outline-variant);
      color: var(--on-background);
    }

    .docs-content h3 {
      font-size: 1rem;
      font-weight: 700;
      margin: 1.5rem 0 0.5rem;
      color: var(--primary);
    }

    .docs-content h4 {
      font-size: 0.9rem;
      font-weight: 700;
      margin: 1.2rem 0 0.4rem;
      color: var(--on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .docs-content p {
      margin: 0.6rem 0;
    }

    .docs-content ul,
    .docs-content ol {
      padding-left: 1.5rem;
      margin: 0.5rem 0;
    }

    .docs-content li {
      margin: 0.2rem 0;
    }

    .docs-content code {
      font-family: "Fira Code", "Cascadia Code", ui-monospace, monospace;
      font-size: 0.85em;
      background: var(--surface-container-high);
      border: 1px solid var(--outline-variant);
      border-radius: 4px;
      padding: 0.1em 0.35em;
      color: var(--primary);
    }

    .docs-content pre {
      background: var(--surface-container-highest);
      border: 1px solid var(--outline-variant);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 0.75rem 0;
    }

    .docs-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.85rem;
      color: var(--on-background);
    }

    .docs-content blockquote {
      border-left: 3px solid var(--primary);
      margin: 0.75rem 0;
      padding: 0.5rem 1rem;
      background: var(--surface-container);
      border-radius: 0 6px 6px 0;
      color: var(--on-surface-variant);
    }

    .docs-content blockquote p {
      margin: 0;
    }

    .docs-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: 0.875rem;
    }

    .docs-content th {
      background: var(--surface-container-high);
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-weight: 700;
      border-bottom: 2px solid var(--outline-variant);
    }

    .docs-content td {
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid var(--outline-variant);
      vertical-align: top;
    }

    .docs-content tr:last-child td {
      border-bottom: none;
    }

    .docs-content tr:nth-child(even) td {
      background: var(--surface-container-lowest);
    }

    .docs-content a {
      color: var(--primary);
      text-decoration: underline;
    }

    .docs-content hr {
      border: none;
      border-top: 1px solid var(--outline-variant);
      margin: 2rem 0;
    }

    .docs-content strong {
      font-weight: 700;
    }

    /* Loading state */
    #loading {
      text-align: center;
      padding: 4rem;
      color: var(--on-surface-variant);
    }
  </style>
</head>

<body class="dark">

  <div class="docs-header">
    <i>bolt</i>
    <h5 class="small logo-top" style="margin:0;flex:1">
      <img src="/img/meshcore.svg"> <span>observer flasher</span>
    </h5>
    <a href="/changelog.html" class="button transparent small m l">
      <i>history</i>
      <span>Changelog</span>
    </a>
    <a href="/?config=mqtt-observer" class="button transparent small m l">
      <i>flash_on</i>
      <span>Back to Flasher</span>
    </a>
    <details class="header-menu s">
      <summary aria-label="Menu"><i>menu</i></summary>
      <div class="header-menu-panel">
        <a href="/changelog.html">
          <i>history</i>
          <span>Changelog</span>
        </a>
        <a href="/?config=mqtt-observer">
          <i>flash_on</i>
          <span>Back to Flasher</span>
        </a>
      </div>
    </details>
  </div>

  <div class="docs-layout">
    <div class="docs-toc" id="toc">
      <h6>On this page</h6>
      <ul id="toc-list"></ul>
    </div>

    <main class="docs-body">
      <div id="loading"><i>hourglass_empty</i> Loading documentation…</div>
      <div class="docs-content" id="docs-content" style="display:none"></div>
    </main>
  </div>

  <script>
    // Known local markdown files — anything else will link to GitHub
    const LOCAL_DOCS = ['MQTT_IMPLEMENTATION.md', 'MQTT_SNMP.md', 'ALERTS.md'];
    const GITHUB_BASE = 'https://github.com/agessaman/MeshCore/blob/mqtt-bridge-implementation-flex/';

    // Resolve which .md file to load (default: MQTT_IMPLEMENTATION.md)
    const params = new URLSearchParams(location.search);
    const docFile = (params.get('doc') || 'MQTT_IMPLEMENTATION').replace(/\.md$/, '') + '.md';
    const docToLoad = LOCAL_DOCS.includes(docFile) ? docFile : 'MQTT_IMPLEMENTATION.md';

    // Configure marked
    marked.use({
      gfm: true,
      breaks: false,
    });

    // Slugify heading text for anchor IDs
    function slugify(text) {
      return text.toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .trim()
        .replace(/[\s_]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    // Custom renderer: add IDs to headings + rewrite .md links
    const renderer = new marked.Renderer();
    renderer.heading = function({ text, depth }) {
      const rawText = text.replace(/<[^>]+>/g, '');
      const id = slugify(rawText);
      return `<h${depth} id="${id}">${text}</h${depth}>\n`;
    };
    renderer.link = function({ href, title, text }) {
      const titleAttr = title ? ` title="${title}"` : '';
      if (href && href.endsWith('.md')) {
        const filename = href.split('/').pop();
        if (LOCAL_DOCS.includes(filename)) {
          // Rewrite to docs.html?doc=FILENAME
          return `<a href="/docs.html?doc=${encodeURIComponent(filename)}"${titleAttr}>${text}</a>`;
        } else {
          // Link to GitHub for unknown .md files
          return `<a href="${GITHUB_BASE}${href}" target="_blank" rel="noopener"${titleAttr}>${text}</a>`;
        }
      }
      const external = href && (href.startsWith('http://') || href.startsWith('https://'));
      return `<a href="${href}"${titleAttr}${external ? ' target="_blank" rel="noopener"' : ''}>${text}</a>`;
    };
    marked.use({ renderer });

    async function loadDocs() {
      try {
        const res = await fetch(`/${docToLoad}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        const html = marked.parse(md);

        document.getElementById('loading').style.display = 'none';
        const content = document.getElementById('docs-content');
        content.innerHTML = html;
        content.style.display = '';

        // Update page title from first h1
        const h1 = content.querySelector('h1');
        if (h1) document.title = `${h1.textContent} — MeshCore Observer`;

        buildToc(content);
        setupScrollSpy();
      } catch (e) {
        document.getElementById('loading').innerHTML =
          `<p>Could not load documentation: ${e.message}</p>`;
      }
    }

    function buildToc(content) {
      const headings = content.querySelectorAll('h2, h3');
      const tocList = document.getElementById('toc-list');
      tocList.innerHTML = '';

      headings.forEach(h => {
        const li = document.createElement('li');
        li.className = h.tagName.toLowerCase();
        const a = document.createElement('a');
        a.href = `#${h.id}`;
        a.textContent = h.textContent;
        a.addEventListener('click', e => {
          e.preventDefault();
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.pushState(null, '', `#${h.id}`);
        });
        li.appendChild(a);
        tocList.appendChild(li);
      });
    }

    function setupScrollSpy() {
      const headings = document.querySelectorAll('.docs-content h2, .docs-content h3');
      const links = document.querySelectorAll('#toc-list a');

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            links.forEach(a => {
              a.classList.toggle('active', a.getAttribute('href') === `#${id}`);
            });
          }
        });
      }, { rootMargin: '-10% 0px -80% 0px' });

      headings.forEach(h => observer.observe(h));
    }

    loadDocs();
  </script>
</body>
</html>
