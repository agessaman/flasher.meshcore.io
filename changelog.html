<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeshCore Observer — Changelog</title>
  <link href="/css/beer.css" rel="stylesheet">
  <link href="/css/flasher.css" rel="stylesheet">
  <script src="/lib/marked.min.js"></script>
  <style>
    body {
      display: block;
      min-height: 100vh;
    }

    .docs-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface-container);
      border-bottom: 1px solid var(--outline-variant);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .docs-header h5 {
      margin: 0;
      flex: 1;
    }

    .docs-header .logo-top img {
      height: 16px;
      margin-top: -4px;
      vertical-align: middle;
    }

    .docs-header .logo-top span {
      font-style: italic;
      font-weight: bold;
      line-height: 0.9;
    }

    .docs-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* Month TOC sidebar on wider screens */
    @media (min-width: 1100px) {
      .docs-layout {
        display: grid;
        grid-template-columns: 220px 1fr;
        max-width: 1200px;
        margin: 0 auto;
        gap: 2rem;
        padding: 2rem 1.5rem 4rem;
      }

      .docs-body {
        max-width: none;
        margin: 0;
        padding: 0;
      }

      .docs-toc {
        position: sticky;
        top: 4rem;
        align-self: start;
        max-height: calc(100vh - 5rem);
        overflow-y: auto;
      }
    }

    @media (max-width: 1099px) {
      .docs-layout {
        padding: 0;
      }

      .docs-toc {
        display: none;
      }
    }

    .docs-toc {
      display: flex;
      flex-direction: column;
    }

    .docs-toc h6 {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--on-surface-variant);
      margin: 0 0 0.5rem;
    }

    .docs-toc ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
    }

    .docs-toc li a {
      display: block;
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
      color: var(--on-surface-variant);
      text-decoration: none;
      border-radius: 4px;
      border-left: 2px solid transparent;
    }

    .docs-toc li a:hover,
    .docs-toc li a.active {
      color: var(--primary);
      border-left-color: var(--primary);
      background: var(--surface-container-high);
    }

    /* Markdown content styles */
    .docs-content {
      color: var(--on-background);
      line-height: 1.7;
    }

    .docs-content h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      color: var(--on-background);
    }

    .docs-content h1 + p {
      color: var(--on-surface-variant);
      margin-top: 0;
      font-size: 1rem;
    }

    /* Month headings */
    .docs-content h3 {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 2rem 0 0.6rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--outline-variant);
      color: var(--primary);
    }

    .docs-content p {
      margin: 0.6rem 0;
    }

    .docs-content ul {
      padding-left: 1.25rem;
      margin: 0.5rem 0;
      list-style: none;
    }

    .docs-content li {
      margin: 0.35rem 0;
      padding-left: 0.25rem;
    }

    /* date · hash trailing token on each entry */
    .docs-content sub {
      display: inline-block;
      margin-left: 0.4rem;
      font-size: 0.72rem;
      vertical-align: baseline;
      color: var(--on-surface-variant);
      opacity: 0.8;
    }

    .docs-content sub code,
    .docs-content code {
      font-family: "Fira Code", "Cascadia Code", ui-monospace, monospace;
      font-size: 0.85em;
      background: var(--surface-container-high);
      border: 1px solid var(--outline-variant);
      border-radius: 4px;
      padding: 0.05em 0.3em;
      color: var(--primary);
    }

    .docs-content a {
      color: var(--primary);
      text-decoration: underline;
    }

    .docs-content strong {
      font-weight: 700;
    }

    #loading {
      text-align: center;
      padding: 4rem;
      color: var(--on-surface-variant);
    }
  </style>
</head>

<body class="dark">

  <div class="docs-header">
    <i>history</i>
    <h5 class="small logo-top" style="margin:0;flex:1">
      <img src="/img/meshcore.svg"> <span>observer changelog</span>
    </h5>
    <a href="/docs.html" class="button transparent small">
      <i>menu_book</i>
      <span>Docs</span>
    </a>
    <a href="/?config=mqtt-observer" class="button transparent small">
      <i>flash_on</i>
      <span>Back to Flasher</span>
    </a>
  </div>

  <div class="docs-layout">
    <div class="docs-toc" id="toc">
      <h6>Jump to month</h6>
      <ul id="toc-list"></ul>
    </div>

    <main class="docs-body">
      <div id="loading"><i>hourglass_empty</i> Loading changelog…</div>
      <div class="docs-content" id="docs-content" style="display:none"></div>
    </main>
  </div>

  <script>
    const GITHUB_BASE = 'https://github.com/agessaman/MeshCore/blob/mqtt-bridge-implementation-flex/';

    marked.use({ gfm: true, breaks: false });

    function slugify(text) {
      return text.toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .trim()
        .replace(/[\s_]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    // Add IDs to headings + open external/.md links sensibly
    const renderer = new marked.Renderer();
    renderer.heading = function({ text, depth }) {
      const rawText = text.replace(/<[^>]+>/g, '');
      const id = slugify(rawText);
      return `<h${depth} id="${id}">${text}</h${depth}>\n`;
    };
    renderer.link = function({ href, title, text }) {
      const titleAttr = title ? ` title="${title}"` : '';
      if (href && href.endsWith('.md')) {
        return `<a href="${GITHUB_BASE}${href}" target="_blank" rel="noopener"${titleAttr}>${text}</a>`;
      }
      const external = href && (href.startsWith('http://') || href.startsWith('https://'));
      return `<a href="${href}"${titleAttr}${external ? ' target="_blank" rel="noopener"' : ''}>${text}</a>`;
    };
    marked.use({ renderer });

    async function loadChangelog() {
      try {
        const res = await fetch('/CHANGELOG.md');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        const html = marked.parse(md);

        document.getElementById('loading').style.display = 'none';
        const content = document.getElementById('docs-content');
        content.innerHTML = html;
        content.style.display = '';

        buildToc(content);
        setupScrollSpy();
      } catch (e) {
        document.getElementById('loading').innerHTML =
          `<p>Could not load changelog: ${e.message}</p>`;
      }
    }

    function buildToc(content) {
      const headings = content.querySelectorAll('h3');
      const tocList = document.getElementById('toc-list');
      tocList.innerHTML = '';
      headings.forEach(h => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `#${h.id}`;
        a.textContent = h.textContent;
        a.addEventListener('click', e => {
          e.preventDefault();
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.pushState(null, '', `#${h.id}`);
        });
        li.appendChild(a);
        tocList.appendChild(li);
      });
    }

    function setupScrollSpy() {
      const headings = document.querySelectorAll('.docs-content h3');
      const links = document.querySelectorAll('#toc-list a');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            links.forEach(a => {
              a.classList.toggle('active', a.getAttribute('href') === `#${id}`);
            });
          }
        });
      }, { rootMargin: '-10% 0px -80% 0px' });
      headings.forEach(h => observer.observe(h));
    }

    loadChangelog();
  </script>
</body>
</html>
